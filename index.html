<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard | Iteration 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1 id="city-name">Boston, MA</h1>
            <p id="date-today"></p>
        </header>

        <section class="current-weather">
            <div class="main-info">
                <i id="current-icon" class="fas fa-cloud"></i>
                <div class="temp-display">
                    <span id="current-temp">--</span>°C
                </div>
                <p id="weather-desc">Loading...</p>
            </div>
            <div class="details">
                <p>Humidity: <span id="humidity">--</span>%</p>
                <p>Wind: <span id="wind">--</span> km/h</p>
            </div>
        </section>

        <hr>

        <section class="forecast-container" id="forecast-list">
            </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
